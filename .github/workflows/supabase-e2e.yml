name: Supabase E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  supabase-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_E2E_EMAIL: ${{ secrets.SUPABASE_E2E_EMAIL }}
      SUPABASE_E2E_PASSWORD: ${{ secrets.SUPABASE_E2E_PASSWORD }}
      SUPABASE_E2E_GROUP_ID: ${{ secrets.SUPABASE_E2E_GROUP_ID }}
      SUPABASE_E2E_NON_MEMBER_EMAIL: ${{ secrets.SUPABASE_E2E_NON_MEMBER_EMAIL }}
      SUPABASE_E2E_NON_MEMBER_PASSWORD: ${{ secrets.SUPABASE_E2E_NON_MEMBER_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Supabase E2E suite
        run: npm run test:supabase:e2e